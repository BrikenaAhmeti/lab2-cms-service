services:
  postgres:
    image: postgres:16-alpine
    container_name: medsphere-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medsphere_cms
    ports:
      - "5432:5432"
    volumes:
      - cms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medsphere_cms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cms-postgres-data:

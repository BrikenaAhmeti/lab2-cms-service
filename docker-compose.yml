services:
  postgres:
    image: postgres:16-alpine
    container_name: medsphere-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medsphere_cms
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - cms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medsphere_cms"]
      interval: 5s
      timeout: 5s
      retries: 10

  cms-service:
    build:
      context: .
      target: development
    container_name: medsphere-cms-service
    environment:
      NODE_ENV: development
      PORT: 3009
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/medsphere_cms?schema=public
    ports:
      - "${PORT:-3009}:3009"
    volumes:
      - .:/app
      - cms-service-node-modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "npx prisma migrate deploy && npm run prisma:generate && npm run dev",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3009/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  cms-postgres-data:
  cms-service-node-modules:
